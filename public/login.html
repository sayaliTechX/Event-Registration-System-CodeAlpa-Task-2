<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Registration System</title>
    <meta name="description" content="Login to your Event Registration System account to manage your event registrations.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-calendar-check"></i>
                <div>
                    <span>Event Registration</span>
                    <small>System</small>
                </div>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-arrow-left"></i> Back to Events
                </a>
            </div>
        </div>
    </nav>

    <!-- Split Layout Auth Page -->
    <div class="auth-page">
        <!-- Left: Brand Panel -->
        <div class="auth-brand">
            <div class="auth-brand-content">
                <h1>Welcome Back!</h1>
                <p>Log in to your account and continue exploring events.</p>
            </div>
        </div>

        <!-- Right: Form -->
        <div class="auth-form-section">
            <h2>Login</h2>

            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        document.getElementById("togglePassword").addEventListener("click", () => {
            const passwordInput = document.getElementById("password");
            const icon = document.querySelector("#togglePassword i");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });

        function showMessage(text, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const rememberMe = document.getElementById("rememberMe").checked;
            const submitBtn = document.getElementById("submitBtn");

            if (!email || !password) {
                showMessage("Please fill in all fields.", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Logging in...";

            try {
                const response = await fetch(
                    "http://localhost:5000/auth/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email, password })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    showMessage("Error: " + (data.error || "Login failed"), "error");
                } else {
                    showMessage("Login successful! Redirecting...", "success");
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    
                    if (rememberMe) {
                        localStorage.setItem("rememberEmail", email);
                    } else {
                        localStorage.removeItem("rememberEmail");
                    }
                    
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                }
            } catch (err) {
                showMessage("Error: " + err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Login";
            }
        });

        // Pre-fill email if remembered
        window.addEventListener("load", () => {
            const rememberEmail = localStorage.getItem("rememberEmail");
            if (rememberEmail) {
                document.getElementById("email").value = rememberEmail;
                document.getElementById("rememberMe").checked = true;
            }
        });
    </script>
</body>
</html>
