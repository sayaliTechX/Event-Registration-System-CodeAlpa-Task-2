<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventConnect</title>
    <meta name="description" content="Create an account to register for amazing events.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-calendar-check"></i>
                <div>
                    <span>EventConnect</span>
                    <small>System</small>
                </div>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-arrow-left"></i> Back to Events
                </a>
            </div>
        </div>
    </nav>

    <!-- Split Layout Auth Page -->
    <div class="auth-page">
        <!-- Left: Form -->
        <div class="auth-form-section">
            <h2>Register</h2>

            <div id="message" class="message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        class="form-input"
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Create a password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            class="form-input"
                            placeholder="Confirm your password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg">
                    Register
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>

        <!-- Right: Brand Panel -->
        <div class="auth-brand">
            <div class="auth-brand-content">
                <h1>Create Account</h1>
                <p>Join us and start registering for amazing events.</p>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <i class="fas fa-calendar-check"></i>
                EventConnect
            </div>
            <div class="footer-text">
                <a href="https://www.linkedin.com/in/sayali-mangale-s1593/" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://github.com/sayaliTechX" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
            <div class="footer-text">
                &copy; 2026 EventConnect. All rights reserved.
            </div>
        </div>
    </footer>
    <script>
        const API_URL = "https://event-registration-api-ogpe.onrender.com";
        // Password toggles
        function setupToggle(toggleId, inputId) {
            document.getElementById(toggleId).addEventListener("click", () => {
                const input = document.getElementById(inputId);
                const icon = document.querySelector(`#${toggleId} i`);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.replace("fa-eye-slash", "fa-eye");
                }
            });
        }
        setupToggle("togglePassword", "password");
        setupToggle("toggleConfirmPassword", "confirmPassword");

        function showMessage(text, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const submitBtn = document.getElementById("submitBtn");

            // Validation
            if (!name || !email || !password) {
                showMessage("Please fill in all fields.", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("Password must be at least 6 characters.", "error");
                return;
            }

            if (password !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Creating account...";

            try {
                const response = await fetch(
                    "${API_URL}/auth/signup",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ name, email, password })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    showMessage("Error: " + (data.error || "Signup failed"), "error");
                } else {
                    showMessage("Account created! Redirecting...", "success");
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                }
            } catch (err) {
                showMessage("Error: " + err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Register";
            }
        });
    </script>
</body>
</html>
